name: Consolidated Daily Feed Automation

on:
  schedule:
    # Executes exactly once every 24 hours at 00:00 UTC time
    - cron: '0 0 * * *'
  workflow_dispatch: # Keeps manual execution overrides open inside your GitHub dashboard

jobs:
  build-and-queue:
    runs-on: ubuntu-latest

    steps:
      - name: Fetch Repository Context
        uses: actions/checkout@v4

      - name: Setup Runtime Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup Dynamic Libraries
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run Injection Scheduler
        env:
          BUFFER_API_KEY: ${{ secrets.BUFFER_API_KEY }}
          BUFFER_CHANNEL_ID: ${{ secrets.BUFFER_CHANNEL_ID }}
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
        run: python main.py
